<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - ShopCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        .pagination-container {
            margin-top: 3rem;
        }
        .page-link {
            color: #0d6efd;
            border: 1px solid #dee2e6;
        }
        .page-link:hover {
            color: #0d6efd;
            background-color: #e9ecef;
        }
        .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .page-item.disabled .page-link {
            color: #6c757d;
        }
        .products-per-page {
            margin-bottom: 2rem;
        }
        .sort-select {
            width: 200px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-shopping-bag me-2"></i>ShopCart
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold" href="catalog.html">Catalog</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            Cart <span class="badge bg-danger cart-count" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 bg-light">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="display-4 fw-bold text-dark mb-3">
                        <i class="fas fa-th-large me-3"></i>Product Catalog
                    </h1>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                        <button class="btn btn-primary" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <!-- Controls -->
            <div class="row mb-4 products-per-page">
                <div class="col-md-6">
                    <div class="d-flex align-items-center gap-3">
                        <label class="mb-0 fw-bold">Show:</label>
                        <select class="form-select form-select-sm" id="productsPerPage" style="width: 80px;">
                            <option value="6">6</option>
                            <option value="12">12</option>
                            <option value="24" selected>24</option>
                            <option value="48">48</option>
                        </select>
                        <span class="text-muted small" id="resultsText">Showing 1-6 of 12 products</span>
                    </div>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="d-flex align-items-center justify-content-end gap-3">
                        <label class="mb-0 fw-bold d-none d-md-block">Sort by:</label>
                        <select class="form-select form-select-sm sort-select" id="sortSelect">
                            <option value="name-asc">Name A-Z</option>
                            <option value="name-desc">Name Z-A</option>
                            <option value="price-asc" selected>Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="newest">Newest First</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="row g-4" id="productsContainer">
                <!-- Products will be dynamically loaded here -->
            </div>

            <!-- Pagination -->
            <div class="pagination-container">
                <nav aria-label="Product pagination">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- Pagination items will be generated here -->
                    </ul>
                </nav>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
       
        const products = [
            {
                id: 1,
                name: "Wireless Headphones",
                price: 10000,
                image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop",
                description: "Premium noise-cancelling headphones with 30hr battery life",
                stock: true
            },
            {
                id: 2,
                name: "Smart Watch Pro",
                price: 20000,
                image: "https://images.unsplash.com/photo-1587563871167-1ee9c731aefb?w=400&h=300&fit=crop",
                description: "Fitness tracker with heart rate & GPS",
                stock: true
            },
            {
                id: 3,
                name: "Bluetooth Speaker",
                price: 15000,
                image: "https://images.unsplash.com/photo-1592899678534-227eff39a878?w=400&h=300&fit=crop",
                description: "Portable speaker with 360° sound & 12hr battery",
                stock: true
            },
            {
                id: 4,
                name: "Gaming Mouse",
                price: 6000,
                image: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400&h=300&fit=crop",
                description: "RGB gaming mouse with 16K DPI sensor",
                stock: true
            },
            {
                id: 5,
                name: "Laptop Stand",
                price: 2000,
                image: "https://images.unsplash.com/photo-1610945262588-8b7a867b960e?w=400&h=300&fit=crop",
                description: "Adjustable aluminum laptop stand",
                stock: true
            },
            {
                id: 6,
                name: "Premium Phone Case",
                price: 1000,
                image: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400&h=300&fit=crop",
                description: "Shockproof case with MagSafe support",
                stock: true
            },
            {
                id: 7,
                name: "Wireless Keyboard",
                price: 8000,
                image: "https://images.unsplash.com/photo-1610945262588-8b7a867b960e?w=400&h=300&fit=crop",
                description: "Mechanical wireless keyboard with RGB lighting",
                stock: true
            },
            {
                id: 8,
                name: "4K Webcam",
                price: 12000,
                image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop",
                description: "Ultra HD webcam with AI auto-focus",
                stock: true
            },
            {
                id: 9,
                name: "Power Bank 20K",
                price: 3000,
                image: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400&h=300&fit=crop",
                description: "20,000mAh fast charging power bank",
                stock: true
            },
            {
                id: 10,
                name: "USB-C Hub",
                price: 4500,
                image: "https://images.unsplash.com/photo-1610945262588-8b7a867b960e?w=400&h=300&fit=crop",
                description: "7-in-1 USB-C docking station",
                stock: true
            },
            {
                id: 11,
                name: "Noise Cancelling Earbuds",
                price: 9000,
                image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop",
                description: "True wireless earbuds with ANC",
                stock: true
            },
            {
                id: 12,
                name: "Gaming Headset",
                price: 7500,
                image: "https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400&h=300&fit=crop",
                description: "Surround sound gaming headset",
                stock: true
            }
        ];

        let currentPage = 1;
        let productsPerPage = 6;
        let filteredProducts = [...products];
        let sortBy = 'price-asc';

        // Format price with commas
        function formatPrice(price) {
            return new Intl.NumberFormat('en-IN').format(price);
        }

        // Create product card HTML
        function createProductCard(product) {
            return `
                <div class="col-lg-4 col-md-6">
                    <div class="card h-100 product-card shadow-sm hover-lift">
                        <img src="${product.image}" 
                             class="card-img-top product-img" alt="${product.name}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold">${product.name}</h5>
                            <p class="card-text text-muted flex-grow-1">${product.description}</p>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="h4 text-primary fw-bold">${formatPrice(product.price)}</span>
                                <span class="badge bg-success">In Stock</span>
                            </div>
                            <button class="btn btn-primary w-100 add-to-cart-btn" 
                                    data-id="${product.id}" 
                                    data-name="${product.name}" 
                                    data-price="${product.price}">
                                <i class="fas fa-cart-plus me-2"></i>Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateResultsText() {
            const start = (currentPage - 1) * productsPerPage + 1;
            const end = Math.min(currentPage * productsPerPage, filteredProducts.length);
            document.getElementById('resultsText').textContent = 
                `Showing ${start}-${end} of ${filteredProducts.length} products`;
        }

        function generatePagination() {
            const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
            let paginationHTML = '';
            
            paginationHTML += `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage - 1}" tabindex="-1">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
            `;

            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            if (startPage > 1) {
                paginationHTML += `<li class="page-item"><a class="page-link" href="#" data-page="1">1</a></li>`;
                if (startPage > 2) {
                    paginationHTML += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>
                `;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHTML += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
                paginationHTML += `
                    <li class="page-item">
                        <a class="page-link" href="#" data-page="${totalPages}">${totalPages}</a>
                    </li>
                `;
            }

            // Next button
            paginationHTML += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage + 1}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            `;

            document.getElementById('pagination').innerHTML = paginationHTML;
        }

        function renderProducts() {
            const startIndex = (currentPage - 1) * productsPerPage;
            const endIndex = startIndex + productsPerPage;
            const pageProducts = filteredProducts.slice(startIndex, endIndex);

            document.getElementById('productsContainer').innerHTML = pageProducts
                .map(product => createProductCard(product))
                .join('');

            updateResultsText();
            generatePagination();

            attachCartListeners();
        }
        function sortProducts() {
            filteredProducts.sort((a, b) => {
                switch (sortBy) {
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    case 'name-desc':
                        return b.name.localeCompare(a.name);
                    case 'price-asc':
                        return a.price - b.price;
                    case 'price-desc':
                        return b.price - a.price;
                    case 'newest':
                        return b.id - a.id;
                    default:
                        return 0;
                }
            });
        }

        function filterProducts(query = '') {
            if (!query.trim()) {
                filteredProducts = [...products];
                return;
            }
            filteredProducts = products.filter(product =>
                product.name.toLowerCase().includes(query.toLowerCase()) ||
                product.description.toLowerCase().includes(query.toLowerCase())
            );
        }

    
        function handlePagination(page) {
            if (page >= 1 && page <= Math.ceil(filteredProducts.length / productsPerPage)) {
                currentPage = page;
                renderProducts();
            }
        }

        
        function attachEventListeners() {
            // Products per page
            document.getElementById('productsPerPage').addEventListener('change', (e) => {
                productsPerPage = parseInt(e.target.value);
                currentPage = 1;
                renderProducts();
            });

        
            document.getElementById('sortSelect').addEventListener('change', (e) => {
                sortBy = e.target.value;
                sortProducts();
                currentPage = 1;
                renderProducts();
            });

         
            document.getElementById('searchBtn').addEventListener('click', performSearch);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            document.getElementById('pagination').addEventListener('click', (e) => {
                if (e.target.dataset.page) {
                    handlePagination(parseInt(e.target.dataset.page));
                }
            });
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value;
            filterProducts(query);
            sortProducts();
            currentPage = 1;
            renderProducts();
        }

        // Cart functionality (existing)
        function attachCartListeners() {
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const product = {
                        id: parseInt(this.dataset.id),
                        name: this.dataset.name,
                        price: parseFloat(this.dataset.price)
                    };
                    
                    // Add to cart logic here
                    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
                    const existingItem = cart.find(item => item.id === product.id);
                    
                    if (existingItem) {
                        existingItem.quantity += 1;
                    } else {
                        product.quantity = 1;
                        cart.push(product);
                    }
                    
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    
                    // Visual feedback
                    const originalText = this.innerHTML;
                    this.innerHTML = '<i class="fas fa-check"></i> Added!';
                    this.classList.add('btn-success');
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.remove('btn-success');
                    }, 1500);
                });
            });
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            attachEventListeners();
            renderProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
